name: 저장소 유지 (60일 규칙 방지)

on:
  schedule:
    # 매월 1일 12:00 KST (03:00 UTC) — 60일 무활동으로 예약 실행이 꺼지는 것을 방지
    - cron: '0 3 1 * *'
  workflow_dispatch:

# 이 워크플로만 커밋 푸시 권한 필요 (최소 권한 원칙)
permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: 타임스탬프 갱신 커밋
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git commit -m "chore: 저장소 활동 유지 (자동)" || echo "변경 없음"
          git push

      # keepalive 가 조용히 죽으면 60일 뒤 감시 전체가 멈추므로, 실패는 반드시 폰으로 알린다
      - name: 실패 시 텔레그램 통보
        if: failure()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 통보 결과를 로그에 남겨 통보 자체의 실패(토큰 만료 등)도 확인 가능하게 한다
          curl -s -w '\ntelegram_http_status:%{http_code}\n' -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=⚠️ [입고 알리미] 저장소 유지(keepalive) 작업이 실패했습니다. GitHub Actions 로그를 확인하세요. 방치하면 60일 후 자동 감시가 멈춥니다."
